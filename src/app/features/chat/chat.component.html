<div class="chat-wrapper" [attr.data-mode]="mode">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-top">
      <div class="header-title">
        <span class="header-chess">♟️</span>
        <span>Chess AI</span>
      </div>
      <span class="mode-badge" [ngClass]="'badge-' + mode">
        {{ currentMode.icon }} {{ currentMode.label }}
      </span>
    </div>

    <div class="modes">
      <button
        *ngFor="let entry of modeEntries"
        (click)="setMode(entry.key)"
        [class]="'mode-btn mode-' + entry.key"
        [class.active]="mode === entry.key"
      >
        {{ entry.value.icon }} {{ entry.value.label }}
      </button>
    </div>

    <div class="mode-desc">{{ currentMode.desc }}</div>
  </div>

  <!-- CHAT BODY -->
  <div class="chat-body" #chatBody>

    <div *ngIf="messages.length === 0" class="empty-state">
      <div class="empty-icon">{{ currentMode.icon }}</div>
      <p class="empty-title">{{ currentMode.label }} Mode</p>
      <p class="empty-hint">{{ currentMode.desc }}</p>
      <p class="empty-cta">Ask me anything about chess ↓</p>
    </div>

    <div *ngFor="let msg of messages" class="message-row" [class.user-row]="msg.role === 'user'">
      <div class="message" [ngClass]="msg.role">
        <div class="msg-text">{{ msg.text }}</div>
        <div class="msg-time">{{ msg.time }}</div>
      </div>
    </div>

    <!-- typing indicator -->
    <div *ngIf="loading" class="message-row">
      <div class="message ai typing">
        <span></span><span></span><span></span>
      </div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="chat-input">
    <input
      [(ngModel)]="input"
      (keyup.enter)="send()"
      placeholder="Ask anything about chess..."
      [disabled]="loading"
      autocomplete="off"
    />
    <button
      class="send-btn"
      [class]="'send-btn send-' + mode"
      (click)="send()"
      [disabled]="loading || !input.trim()"
      [attr.aria-label]="'Send'"
    >
      <span *ngIf="!loading" class="send-icon">➤</span>
      <span *ngIf="loading" class="sending-dots">
        <span></span><span></span><span></span>
      </span>
    </button>
  </div>

</div>
