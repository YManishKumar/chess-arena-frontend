<div class="dashboard-wrapper">
  <div class="dash-header">
    <div class="dash-logo">&#9823; Chess Arena</div>
    <div class="dash-actions">
      <a routerLink="/chat" class="btn-chat">Open Chat</a>
      <button class="btn-logout" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="dash-body">
    <div class="welcome">
      <h2>Welcome back &#128075;</h2>
      <p class="phone">{{ phone }}</p>
    </div>

    <div class="stats-grid">
      <div *ngFor="let s of stats" class="stat-card">
        <div class="stat-icon" [innerHTML]="s.icon"></div>
        <div class="stat-value">{{ s.value }}</div>
        <div class="stat-label">{{ s.label }}</div>
      </div>
    </div>

    <div class="quick-actions">
      <h3>Quick Start</h3>
      <a routerLink="/chat" class="action-card">
        <span class="action-icon">&#129302;</span>
        <div>
          <div class="action-title">Chess AI Chat</div>
          <div class="action-sub">Coach, Fun, or Serious mode</div>
        </div>
        <span class="action-arrow">&#8594;</span>
      </a>
    </div>
  </div>
</div>
