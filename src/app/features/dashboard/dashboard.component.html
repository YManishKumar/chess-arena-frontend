<div class="dashboard-wrapper">
  <div class="dash-body">
    <div class="welcome">
      <h2>Welcome back 👋</h2>
      <p class="email">{{ email }}</p>
    </div>

    <div class="stats-grid">
      <div *ngFor="let s of stats" class="stat-card">
        <div class="stat-icon" [innerHTML]="s.icon"></div>
        <div class="stat-value">{{ s.value }}</div>
        <div class="stat-label">{{ s.label }}</div>
      </div>
    </div>

    <div class="quick-actions">
      <h3>Quick Start</h3>
      <a routerLink="/chat" class="action-card">
        <span class="action-icon">🤖</span>
        <div>
          <div class="action-title">Chess AI Chat</div>
          <div class="action-sub">Coach, Fun, or Serious mode</div>
        </div>
        <span class="action-arrow">→</span>
      </a>
      <a routerLink="/friends" class="action-card">
        <span class="action-icon">👥</span>
        <div>
          <div class="action-title">Friends</div>
          <div class="action-sub">Coming soon</div>
        </div>
        <span class="action-arrow">→</span>
      </a>
    </div>
  </div>
</div>
